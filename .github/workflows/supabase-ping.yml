name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 8 */2 * *'  # Toutes les 48h à 8h UTC
  workflow_dispatch:         # Lancement manuel possible

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase (table clients)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/clients?limit=1")
          echo "Supabase ping status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "⚠️ Ping échoué avec le statut $STATUS"
            exit 1
          fi
          echo "✅ Supabase actif"
