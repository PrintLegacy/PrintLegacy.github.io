<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Print Legacy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080706;--bg2:#0F0E0C;--bg3:#161410;--gold:#C9A84C;--gold2:#E8C97A;--text:#F0EBE0;--muted:#6A6458;--border:rgba(201,168,76,0.12);--danger:#C0392B}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 40% at 50% 0%,rgba(201,168,76,0.06) 0%,transparent 70%);pointer-events:none;z-index:0}
.view{display:none;position:relative;z-index:1;min-height:100vh}.view.active{display:block}
input,textarea{width:100%;padding:11px 14px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
input:focus,textarea:focus{border-color:rgba(201,168,76,.4)}
textarea{resize:vertical;height:72px}
label{display:block;font-size:11px;color:var(--muted);letter-spacing:.08em;margin-bottom:5px}
.field{margin-bottom:14px}.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn-gold{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#080706;border:none;border-radius:11px;font-size:13px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity .2s,transform .15s}
.btn-gold:hover{opacity:.88;transform:translateY(-1px)}
/* DASHBOARD */
#view-dash{padding:40px 24px 80px}
.dash-inner{max-width:920px;margin:0 auto}
.dash-top{display:flex;align-items:center;justify-content:space-between;padding-bottom:28px;border-bottom:1px solid var(--border);margin-bottom:40px}
.logo{font-family:'Cormorant Garamond',serif;font-size:24px;letter-spacing:.06em}.logo em{font-style:italic;color:var(--gold)}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:40px}
.stat{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:14px;padding:20px 22px}
.stat-n{font-family:'Cormorant Garamond',serif;font-size:38px;color:var(--gold);line-height:1;margin-bottom:4px}
.stat-l{font-size:11px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}
.sec-label{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:16px;display:flex;align-items:center;gap:12px}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px}
.cc{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:16px;padding:20px;transition:border-color .2s}
.cc:hover{background:rgba(201,168,76,0.03);border-color:rgba(201,168,76,.25)}
.cc-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.av{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#2A2520,#1A1510);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--gold);overflow:hidden;flex-shrink:0}
.av img{width:100%;height:100%;object-fit:cover}
.cc-name{font-size:15px;font-weight:400;margin-bottom:2px}.cc-role{font-size:12px;color:var(--muted)}
.cc-url{font-size:11px;color:var(--gold);opacity:.55;margin-bottom:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cc-btns{display:flex;gap:7px}
.cc-btn{flex:1;padding:7px;border-radius:8px;border:1px solid var(--border);background:transparent;font-size:12px;color:var(--text);cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .2s,border-color .2s,color .2s}
.cc-btn.v:hover{border-color:var(--gold);color:var(--gold)}
.cc-btn.e:hover{border-color:#6FA8FF;color:#6FA8FF}
.cc-btn.d:hover{border-color:var(--danger);color:var(--danger)}
.empty{grid-column:1/-1;text-align:center;padding:60px 0;color:var(--muted);font-size:14px}
/* FORM */
#view-form{padding:40px 24px 80px}
.form-inner{max-width:540px;margin:0 auto}
.form-head{display:flex;align-items:center;gap:14px;margin-bottom:36px}
.back{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .2s,color .2s;flex-shrink:0}
.back:hover{border-color:var(--gold);color:var(--gold)}
.form-title{font-family:'Cormorant Garamond',serif;font-size:26px}
.fsec{margin-bottom:26px}
.fsec-label{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);opacity:.6;margin-bottom:14px}
.photo-zone{display:flex;align-items:center;gap:16px;padding:16px;background:rgba(255,255,255,0.02);border:1px dashed var(--border);border-radius:12px;cursor:pointer;transition:border-color .2s}
.photo-zone:hover{border-color:rgba(201,168,76,.35)}
.photo-prev{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#2A2520,#1A1510);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--gold);overflow:hidden;flex-shrink:0}
.photo-prev img{width:100%;height:100%;object-fit:cover}
.photo-txt{font-size:13px;color:var(--muted)}.photo-txt b{display:block;color:var(--text);margin-bottom:2px;font-weight:400}
.themes{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.th{padding:10px 8px;border-radius:10px;border:2px solid transparent;cursor:pointer;text-align:center;font-size:11px;color:var(--muted);transition:border-color .2s,color .2s}
.th.sel{border-color:var(--gold);color:var(--text)}
.th-sw{height:24px;border-radius:6px;margin-bottom:6px}
.th-dark .th-sw{background:linear-gradient(135deg,#0A0908,#C9A84C)}
.th-cream .th-sw{background:linear-gradient(135deg,#F5F2EC,#8A6A2A)}
.th-ocean .th-sw{background:linear-gradient(135deg,#060D1A,#4A90E2)}
.th-forest .th-sw{background:linear-gradient(135deg,#060F08,#4CAF50)}
.soc-list{display:flex;flex-direction:column;gap:8px}
.soc-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:10px}
.soc-ico{font-size:17px;width:26px;text-align:center;flex-shrink:0}
.soc-input{flex:1;background:transparent;border:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none}
.soc-input::placeholder{color:var(--muted)}
/* CARD PUBLIC */
#view-card{display:flex;flex-direction:column;align-items:center;padding:48px 20px 80px}
.card-back{position:fixed;top:16px;left:16px;padding:7px 14px;border-radius:99px;background:rgba(8,7,6,.85);border:1px solid var(--border);font-size:12px;color:var(--muted);cursor:pointer;backdrop-filter:blur(12px);z-index:10;transition:color .2s;font-family:'DM Sans',sans-serif}
.card-back:hover{color:var(--gold)}
.dcard{width:100%;max-width:400px;background:rgba(255,255,255,0.025);border:1px solid var(--border);border-radius:24px;overflow:hidden;animation:up .6s ease forwards}
@keyframes up{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
.dcard-head{position:relative;padding:36px 28px 24px;text-align:center;border-bottom:1px solid var(--border);background:linear-gradient(180deg,rgba(201,168,76,.05) 0%,transparent 100%)}
.dcard-head::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:56px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.dav{width:82px;height:82px;border-radius:50%;margin:0 auto 16px;background:linear-gradient(135deg,#2A2520,#1A1510);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:30px;color:var(--gold);overflow:hidden}
.dav img{width:100%;height:100%;object-fit:cover}
.dname{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:400;margin-bottom:4px}
.djob{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:3px}
.dcompany{font-size:12px;color:var(--muted)}
.dbio{padding:16px 28px;font-size:13px;color:var(--muted);line-height:1.8;text-align:center;font-style:italic;border-bottom:1px solid var(--border)}
.dlinks{padding:16px 18px;display:flex;flex-direction:column;gap:8px}
.dlink{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:10px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);text-decoration:none;color:var(--text);font-size:13px;transition:background .2s,border-color .2s,transform .15s}
.dlink:hover{background:rgba(201,168,76,.07);border-color:rgba(201,168,76,.22);transform:translateX(3px)}
.dlink-ico{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.dlink-lbl{flex:1}.dlink-arr{color:var(--muted);font-size:14px}
.dsave{padding:0 18px 22px}
.dsave-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#080706;border:none;border-radius:10px;font-size:13px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity .2s}
.dsave-btn:hover{opacity:.88}
.nfc-box{width:100%;max-width:400px;margin-top:14px;background:rgba(201,168,76,.04);border:1px solid var(--border);border-radius:14px;padding:12px 16px;display:flex;align-items:center;gap:12px}
.nfc-url{flex:1;font-size:11px;color:var(--gold);opacity:.65;word-break:break-all}
.nfc-copy{padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:transparent;font-size:12px;color:var(--text);cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;transition:border-color .2s,color .2s}
.nfc-copy:hover{border-color:var(--gold);color:var(--gold)}
.dcard-foot{text-align:center;margin-top:22px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);opacity:.4}
.dcard-foot b{color:var(--gold);font-weight:400;opacity:1}
.t-cream{--bg:#F5F2EC;--text:#1A1814;--muted:#8A8278;--border:rgba(26,24,20,.1);--gold:#8A6A2A;--gold2:#A07830}
.t-ocean{--bg:#060D1A;--text:#E8F0FF;--muted:#3A5070;--border:rgba(74,144,226,.18);--gold:#4A90E2;--gold2:#7AB4FF}
.t-forest{--bg:#060F08;--text:#E8F5E9;--muted:#3A6045;--border:rgba(76,175,80,.18);--gold:#4CAF50;--gold2:#80C784}
.loader{position:fixed;inset:0;background:rgba(8,7,6,.85);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px)}
.spin{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:rgba(201,168,76,.1);border:1px solid var(--border);border-radius:99px;padding:10px 24px;font-size:13px;color:var(--gold);backdrop-filter:blur(20px);transition:transform .3s;z-index:999;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.err{background:rgba(192,57,43,.1);color:#E74C3C;border-color:rgba(192,57,43,.2)}
@media(max-width:600px){.stats{grid-template-columns:1fr 1fr}.stats .stat:last-child{grid-column:1/-1}.row2{grid-template-columns:1fr}.themes{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<div class="loader" id="loader" style="display:none">
  <div style="text-align:center"><div class="spin"></div><div style="font-size:13px;color:var(--muted)" id="loader-msg">Chargement...</div></div>
</div>
<div class="toast" id="toast"></div>

<!-- DASHBOARD -->
<div class="view active" id="view-dash">
  <div style="padding:40px 24px 80px">
    <div class="dash-inner">
      <div class="dash-top">
        <div class="logo">Print <em>Legacy</em></div>
        <button class="btn-gold" style="width:auto;padding:10px 20px" onclick="openForm()">＋ Nouvelle carte</button>
      </div>
      <div class="stats">
        <div class="stat"><div class="stat-n" id="s-total">—</div><div class="stat-l">Clients actifs</div></div>
        <div class="stat"><div class="stat-n" id="s-month">—</div><div class="stat-l">Ce mois</div></div>
        <div class="stat"><div class="stat-n">∞</div><div class="stat-l">Cartes illimitées</div></div>
      </div>
      <p class="sec-label">Mes clients</p>
      <div class="grid" id="clients-grid">
        <div class="empty"><div style="font-size:36px;margin-bottom:12px;opacity:.4">✦</div>Chargement...</div>
      </div>
    </div>
  </div>
</div>

<!-- FORM -->
<div class="view" id="view-form">
  <div class="form-inner">
    <div class="form-head">
      <button class="back" onclick="showDash()">←</button>
      <h2 class="form-title" id="form-title">Nouvelle carte</h2>
    </div>
    <div class="fsec">
      <div class="photo-zone" onclick="document.getElementById('photo-inp').click()">
        <div class="photo-prev" id="photo-prev">📷</div>
        <div class="photo-txt"><b>Photo de profil</b>Cliquez pour choisir une image</div>
      </div>
      <input type="file" id="photo-inp" accept="image/*" style="display:none" onchange="handlePhoto(this)">
    </div>
    <div class="fsec">
      <p class="fsec-label">Identité</p>
      <div class="row2">
        <div class="field"><label>Prénom *</label><input id="f-fn" placeholder="Jean"></div>
        <div class="field"><label>Nom *</label><input id="f-ln" placeholder="Dupont"></div>
      </div>
      <div class="field"><label>Poste</label><input id="f-job" placeholder="Directeur commercial"></div>
      <div class="field"><label>Entreprise</label><input id="f-co" placeholder="Mon Entreprise"></div>
      <div class="field"><label>Bio / Slogan</label><textarea id="f-bio" placeholder="Courte description..."></textarea></div>
    </div>
    <div class="fsec">
      <p class="fsec-label">Coordonnées</p>
      <div class="field"><label>Téléphone</label><input id="f-tel" type="tel" placeholder="+221 77 000 0000"></div>
      <div class="field"><label>WhatsApp</label><input id="f-wa" type="tel" placeholder="+221 77 000 0000"></div>
      <div class="field"><label>Email</label><input id="f-em" type="email" placeholder="jean@exemple.com"></div>
      <div class="field"><label>Site web</label><input id="f-web" placeholder="https://monsite.com"></div>
    </div>
    <div class="fsec">
      <p class="fsec-label">Réseaux sociaux</p>
      <div class="soc-list">
        <div class="soc-row"><span class="soc-ico">📸</span><input class="soc-input" id="f-ig" placeholder="instagram.com/username"></div>
        <div class="soc-row"><span class="soc-ico">🎨</span><input class="soc-input" id="f-be" placeholder="behance.net/username"></div>
        <div class="soc-row"><span class="soc-ico">💼</span><input class="soc-input" id="f-li" placeholder="linkedin.com/in/username"></div>
        <div class="soc-row"><span class="soc-ico">🎵</span><input class="soc-input" id="f-tt" placeholder="tiktok.com/@username"></div>
        <div class="soc-row"><span class="soc-ico">▶️</span><input class="soc-input" id="f-yt" placeholder="youtube.com/@username"></div>
      </div>
    </div>
    <div class="fsec">
      <p class="fsec-label">Thème</p>
      <div class="themes">
        <div class="th th-dark sel" onclick="selTheme('dark',this)"><div class="th-sw"></div>Or & Nuit</div>
        <div class="th th-cream" onclick="selTheme('cream',this)"><div class="th-sw"></div>Crème</div>
        <div class="th th-ocean" onclick="selTheme('ocean',this)"><div class="th-sw"></div>Océan</div>
        <div class="th th-forest" onclick="selTheme('forest',this)"><div class="th-sw"></div>Forêt</div>
      </div>
    </div>
    <button class="btn-gold" id="submit-btn" onclick="saveClient()">Créer la carte →</button>
    <div style="height:40px"></div>
  </div>
</div>

<!-- CARD -->
<div class="view" id="view-card">
  <button class="card-back" id="card-back-btn" onclick="showDash()">← Tableau de bord</button>
  <div id="card-render" style="width:100%;display:flex;flex-direction:column;align-items:center;padding:48px 20px 80px"></div>
</div>

<script>
const SB_URL='https://szpjpytpciptplqjfwyd.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN6cGpweXRwY2lwdHBscWpmd3lkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NDA3MTMsImV4cCI6MjA5MzIxNjcxM30.WWXHihsbAKge_oHdbBAPLM40swm2P0XMco7kSrCO9e4';
const H={'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};

let editId=null,selThemeVal='dark',photoB64=null;

async function sb(path,opts={}){
  const r=await fetch(SB_URL+'/rest/v1/'+path,{...opts,headers:{...H,...(opts.headers||{})}});
  if(!r.ok){const e=await r.text();throw new Error(e);}
  return r.status===204?null:r.json();
}

function showView(id){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById('view-'+id).classList.add('active');window.scrollTo(0,0);}

async function showDash(){
  showView('dash');load('Chargement...');
  try{const c=await sb('clients?order=created_at.desc');renderDash(c);}
  catch(e){toast('Erreur BD: '+e.message,true);renderDash([]);}
  hideLoad();
}

function renderDash(clients){
  document.getElementById('s-total').textContent=clients.length;
  const now=new Date();
  document.getElementById('s-month').textContent=clients.filter(c=>{const d=new Date(c.created_at);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}).length;
  const grid=document.getElementById('clients-grid');
  if(!clients.length){grid.innerHTML='<div class="empty"><div style="font-size:36px;margin-bottom:12px;opacity:.4">✦</div>Aucun client — créez votre première carte !</div>';return;}
  grid.innerHTML=clients.map(c=>`
    <div class="cc">
      <div class="cc-top">
        <div class="av">${c.photo?`<img src="${c.photo}">`:ini(c.firstname,c.lastname)}</div>
        <div><div class="cc-name">${c.firstname} ${c.lastname}</div><div class="cc-role">${c.jobtitle||c.company||'—'}</div></div>
      </div>
      <div class="cc-url">🔗 ${cardUrl(c)}</div>
      <div class="cc-btns">
        <button class="cc-btn v" onclick="viewCard('${c.id}')">👁 Voir</button>
        <button class="cc-btn e" onclick="openForm('${c.id}')">✏️ Éditer</button>
        <button class="cc-btn d" onclick="delClient('${c.id}')">🗑</button>
      </div>
    </div>`).join('');
}

function openForm(id=null){
  editId=id;selThemeVal='dark';photoB64=null;
  document.getElementById('photo-prev').innerHTML='📷';
  ['fn','ln','job','co','bio','tel','wa','em','web','ig','be','li','tt','yt'].forEach(k=>document.getElementById('f-'+k).value='');
  document.querySelectorAll('.th').forEach(t=>t.classList.remove('sel'));
  document.querySelector('.th-dark').classList.add('sel');
  document.getElementById('form-title').textContent=id?'Modifier la carte':'Nouvelle carte';
  document.getElementById('submit-btn').textContent=id?'Enregistrer →':'Créer la carte →';
  if(id){
    load('Chargement...');
    sb(`clients?id=eq.${id}`).then(([c])=>{
      if(!c)return;
      document.getElementById('f-fn').value=c.firstname||'';
      document.getElementById('f-ln').value=c.lastname||'';
      document.getElementById('f-job').value=c.jobtitle||'';
      document.getElementById('f-co').value=c.company||'';
      document.getElementById('f-bio').value=c.bio||'';
      document.getElementById('f-tel').value=c.phone||'';
      document.getElementById('f-wa').value=c.whatsapp||'';
      document.getElementById('f-em').value=c.email||'';
      document.getElementById('f-web').value=c.website||'';
      document.getElementById('f-ig').value=c.instagram||'';
      document.getElementById('f-be').value=c.behance||'';
      document.getElementById('f-li').value=c.linkedin||'';
      document.getElementById('f-tt').value=c.tiktok||'';
      document.getElementById('f-yt').value=c.youtube||'';
      selThemeVal=c.theme||'dark';
      document.querySelectorAll('.th').forEach(t=>t.classList.remove('sel'));
      document.querySelector('.th-'+selThemeVal).classList.add('sel');
      if(c.photo){photoB64=c.photo;document.getElementById('photo-prev').innerHTML=`<img src="${c.photo}">`;}
      hideLoad();
    }).catch(()=>hideLoad());
  }
  showView('form');
}

function handlePhoto(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{photoB64=e.target.result;document.getElementById('photo-prev').innerHTML=`<img src="${photoB64}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;};
  r.readAsDataURL(f);
}

function selTheme(t,el){selThemeVal=t;document.querySelectorAll('.th').forEach(o=>o.classList.remove('sel'));el.classList.add('sel');}
function g(id){return document.getElementById(id).value.trim();}

async function saveClient(){
  const fn=g('f-fn'),ln=g('f-ln');
  if(!fn||!ln){toast('Prénom et nom requis !',true);return;}
  const data={firstname:fn,lastname:ln,jobtitle:g('f-job'),company:g('f-co'),bio:g('f-bio'),phone:g('f-tel'),whatsapp:g('f-wa'),email:g('f-em'),website:g('f-web'),instagram:g('f-ig'),behance:g('f-be'),linkedin:g('f-li'),tiktok:g('f-tt'),youtube:g('f-yt'),theme:selThemeVal,photo:photoB64,slug:slugify(fn,ln)};
  load('Sauvegarde...');
  try{
    if(editId){await sb(`clients?id=eq.${editId}`,{method:'PATCH',headers:{'Prefer':'return=representation'},body:JSON.stringify(data)});}
    else{await sb('clients',{method:'POST',headers:{'Prefer':'return=representation'},body:JSON.stringify(data)});}
    toast(editId?'Carte mise à jour !':'Carte créée !');
    editId=null;showDash();
  }catch(e){hideLoad();toast('Erreur: '+e.message,true);}
}

async function delClient(id){
  if(!confirm('Supprimer cette carte ?'))return;
  load('Suppression...');
  try{await sb(`clients?id=eq.${id}`,{method:'DELETE'});toast('Carte supprimée');showDash();}
  catch(e){hideLoad();toast('Erreur',true);}
}

async function viewCard(id){
  load('Chargement...');
  try{
    const [c]=await sb(`clients?id=eq.${id}`);
    hideLoad();renderCard(c,true);showView('card');
  }catch(e){hideLoad();toast('Erreur',true);}
}

function renderCard(c,showBack=false){
  const thCls=c.theme==='cream'?'t-cream':c.theme==='ocean'?'t-ocean':c.theme==='forest'?'t-forest':'';
  const url=cardUrl(c);
  const links=[
    c.phone&&{href:`tel:${c.phone}`,ico:'📞',lbl:c.phone,bg:'rgba(52,199,89,.12)',cl:'#34C759'},
    (c.whatsapp||c.phone)&&{href:`https://wa.me/${(c.whatsapp||c.phone).replace(/\D/g,'')}`,ico:'💬',lbl:'WhatsApp',bg:'rgba(37,211,102,.12)',cl:'#25D366',t:'_blank'},
    c.email&&{href:`mailto:${c.email}`,ico:'✉️',lbl:c.email,bg:'rgba(201,168,76,.12)',cl:'var(--gold)'},
    c.website&&{href:c.website,ico:'🌐',lbl:'Site web',bg:'rgba(255,255,255,.06)',cl:'var(--text)',t:'_blank'},
    c.instagram&&{href:`https://${c.instagram}`,ico:'📸',lbl:'Instagram',bg:'rgba(225,48,108,.12)',cl:'#E1306C',t:'_blank'},
    c.behance&&{href:`https://${c.behance}`,ico:'🎨',lbl:'Behance',bg:'rgba(23,119,242,.12)',cl:'#1773F2',t:'_blank'},
    c.linkedin&&{href:`https://${c.linkedin}`,ico:'💼',lbl:'LinkedIn',bg:'rgba(10,102,194,.15)',cl:'#0A66C2',t:'_blank'},
    c.tiktok&&{href:`https://${c.tiktok}`,ico:'🎵',lbl:'TikTok',bg:'rgba(255,0,80,.1)',cl:'#FF0050',t:'_blank'},
    c.youtube&&{href:`https://${c.youtube}`,ico:'▶️',lbl:'YouTube',bg:'rgba(255,0,0,.1)',cl:'#FF0000',t:'_blank'},
  ].filter(Boolean);
  document.getElementById('card-back-btn').style.display=showBack?'block':'none';
  document.getElementById('card-render').innerHTML=`
    <div class="dcard ${thCls}">
      <div class="dcard-head">
        <div class="dav">${c.photo?`<img src="${c.photo}">`:ini(c.firstname,c.lastname)}</div>
        <div class="dname">${c.firstname} ${c.lastname}</div>
        ${c.jobtitle?`<div class="djob">${c.jobtitle}</div>`:''}
        ${c.company?`<div class="dcompany">${c.company}</div>`:''}
      </div>
      ${c.bio?`<div class="dbio">${c.bio}</div>`:''}
      <div class="dlinks">${links.map(l=>`<a href="${l.href}" class="dlink"${l.t?` target="${l.t}"`:''}><span class="dlink-ico" style="background:${l.bg};color:${l.cl}">${l.ico}</span><span class="dlink-lbl">${l.lbl}</span><span class="dlink-arr">›</span></a>`).join('')}</div>
      <div class="dsave"><button class="dsave-btn" onclick='saveVCard(${JSON.stringify(c).replace(/'/g,"&#39;")})'>＋ Enregistrer le contact</button></div>
    </div>
    ${showBack?`<div class="nfc-box"><span class="nfc-url">🔗 ${url}</span><button class="nfc-copy" onclick="copyUrl('${url}')">Copier URL NFC</button></div>`:''}
    <div class="dcard-foot">Carte by <b>Print Legacy</b></div>`;
}

function saveVCard(c){
  const l=['BEGIN:VCARD','VERSION:3.0',`N:${c.lastname};${c.firstname};;;`,`FN:${c.firstname} ${c.lastname}`];
  if(c.jobtitle)l.push('TITLE:'+c.jobtitle);
  if(c.company)l.push('ORG:'+c.company);
  if(c.phone)l.push('TEL;TYPE=CELL:'+c.phone);
  if(c.email)l.push('EMAIL:'+c.email);
  if(c.website)l.push('URL:'+c.website);
  l.push('END:VCARD');
  const a=document.createElement('a');
  a.href='data:text/vcard;charset=utf-8,'+encodeURIComponent(l.join('\r\n'));
  a.download=`${c.firstname}_${c.lastname}.vcf`;a.click();
  toast('Contact téléchargé !');
}

function copyUrl(url){
  navigator.clipboard?navigator.clipboard.writeText('https://'+url):(()=>{const t=document.createElement('textarea');t.value='https://'+url;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);})();
  toast('URL copiée — à encoder sur la NFC !');
}

function ini(fn,ln){return(((fn||'')[0]||'')+((ln||'')[0]||'')).toUpperCase()||'?'}
function slugify(fn,ln){return(fn+'-'+ln).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9-]/g,'-').replace(/-+/g,'-')}
function cardUrl(c){return`printlegacy1.netlify.app/?carte=${c.slug||slugify(c.firstname,c.lastname)}`}
function load(msg){document.getElementById('loader-msg').textContent=msg;document.getElementById('loader').style.display='flex'}
function hideLoad(){document.getElementById('loader').style.display='none'}
function toast(msg,err=false){const t=document.getElementById('toast');t.textContent=msg;t.className='toast'+(err?' err':'');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}

// ROUTING PUBLIC
async function init(){
  const slug=new URLSearchParams(location.search).get('carte');
  if(slug){
    document.body.style.background='var(--bg)';
    load('Chargement de la carte...');
    try{
      const data=await sb(`clients?slug=eq.${slug}`);
      hideLoad();
      if(data&&data.length){renderCard(data[0],false);showView('card');}
      else{document.getElementById('card-render').innerHTML='<div style="text-align:center;padding:80px 20px;color:var(--muted)"><div style="font-size:40px;margin-bottom:16px">✦</div>Carte introuvable</div>';showView('card');}
    }catch(e){hideLoad();showDash();}
  }else{showDash();}
}
init();
</script>
